# Campaign-display aliases for coverage import.
#
# Maps raw xlsx product-column strings to canonical campaign labels.
# Consumed by scripts/import-coverage.py.
#
# Each rule sets:
#   label  — canonical "<Category> - <Model>" string shown in the Campaign column (required)
#   event  — optional event tag (filterable separately from the label)
#
# Lookup order:
#   1. `exact:` map — raw value matched as-is (after .strip()), case-sensitive.
#   2. `patterns:` list — ordered regex fallbacks, first match wins.
#
# Unmapped raw values are logged to .coverage-import.log so this file can be iterated.

