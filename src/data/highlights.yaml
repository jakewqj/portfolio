      - 2025-08-01-midifan            # CN · News · Tier 1

# Awards / Editor's Picks — sourced from the 2025 brand partner & media doc.
# Each entry can include:
#   outlet         flagship outlet name (English-first)
#   outlet_zh      Chinese-language outlet name (optional, for hover/secondary line)
#   award          award title (English where official, otherwise the original)
#   issue          which print issue / event the award appeared in (optional)
#   products       list of award-winning products (use display names)
#   year           year of the award
#   note           any extra context to appear under the entry (optional)
#   badge          file under public/coverage/awards/ — award seal / laurel / sticker (preferred hero visual)
#   badge_kind     "seal"  → transparent badge, displayed centered on a tinted backdrop
#                  "page"  → full-bleed magazine clipping, displayed edge-to-edge
awards:
  - outlet: Guitar World
    outlet_zh: 美国《Guitar World》
    award: Performance Gold Award
    products: ["Donner Circle Looper Pedal"]
    year: 2024
    badge: guitar-world-performance-gold.png
    badge_kind: seal

