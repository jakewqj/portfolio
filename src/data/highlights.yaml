# Curated highlights — clipping IDs that should appear as screenshot cards.
# Each clipping ID maps to a clipping in src/data/coverage.json (regenerated by import-coverage.py).
# Each ID also expects a matching screenshot at public/coverage/screenshots/<id>.jpg (or .png).
# If the screenshot file is missing, the page falls back to a text-only card.
#
# To find a clipping ID: run `python scripts/import-coverage.py`, then grep coverage.json
# by URL or outlet name. IDs follow the pattern  YYYY-MM-DD-<outlet-slug>.

# Top of /coverage/ — the screenshot wall
overview_highlights: []

# Per-campaign feature picks — show up at the top of each campaign detail page.
# If empty, the campaign page renders all of its clippings as text rows.
campaigns:
  triple-threat:
    cover: triple-threat-cover.jpg
    clippings_to_feature: []
  namm-2026:
    cover: namm-2026-cover.jpg
    clippings_to_feature: []
  hush-x:
    cover: hush-x-cover.jpg
    clippings_to_feature: []
  l1-synth:
    cover: l1-cover.jpg
    clippings_to_feature: []

# Awards / Editor's Picks — sourced from the 2025 brand partner & media doc.
# Each entry can include:
#   outlet         flagship outlet name (English-first)
#   outlet_zh      Chinese-language outlet name (optional, for hover/secondary line)
#   award          award title (English where official, otherwise the original)
#   issue          which print issue / event the award appeared in (optional)
#   products       list of award-winning products (use display names)
#   year           year of the award
#   note           any extra context to appear under the entry (optional)
#   badge          file under public/coverage/awards/ — award seal / laurel / sticker (preferred hero visual)
#   badge_kind     "seal"  → transparent badge, displayed centered on a tinted backdrop
#                  "page"  → full-bleed magazine clipping, displayed edge-to-edge
awards:
  - outlet: Guitar World
    outlet_zh: 美国《Guitar World》
    award: Performance Gold Award
    products: ["Donner Circle Looper Pedal"]
    year: 2024
    badge: guitar-world-performance-gold.png
    badge_kind: seal

  - outlet: Guitar World
    outlet_zh: 美国《Guitar World》
    award: Best Gear of the Year 2024
    products: ["Triple Threat", "HUSH-X"]
    year: 2024
    badge: guitar-world-best-gear-2024.png
    badge_kind: page

  - outlet: Total Guitar
    outlet_zh: 英国《Total Guitar》
    award: Best Buy Award
    issue: August 2024, Issue 386
    products: ["Donner × Third Man Hardware — Triple Threat"]
    year: 2024
    badge: total-guitar-best-buy.png
    badge_kind: seal

  - outlet: Guitar Player
    outlet_zh: 美国《Guitar Player》
    award: Editor's Pick
    issue: May 2024 Issue
    products: ["Donner × Third Man Hardware — Triple Threat"]
    year: 2024
    badge: guitar-player-editors-pick.png
    badge_kind: seal

  - outlet: Music Inc
    outlet_zh: 美国《Music Inc.》
    award: NAMM 2024 Editor's Choice
    issue: NAMM Show official publication
    products: ["Donner × Third Man Hardware — Triple Threat"]
    year: 2024
