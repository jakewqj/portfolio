# Campaign matching rules. First match wins. Used by the import script to tag clippings.
# Patterns are matched (case-insensitive) against the "推广产品/项目" column.
# Add rules here when launching new featured campaigns.
campaigns:
  - slug: namm-2026
    patterns: ["NAMM 2026", "namm2026", "NAMM2026"]
  - slug: triple-threat
    patterns: ["Triple Threat", "TripleThreat", "triple-threat"]
  - slug: hush-x
    patterns: ["HUSH-X", "HUSH X", "HUHS-X", "HUSHX"]
  - slug: l1-synth
    patterns: ["\\bL1\\b"]   # word-boundary regex to avoid matching L10/L100/etc.

# Domain → region fallback (used when row's region cell is empty, e.g. 2023 sheet).
domain_region_fallback:
  ".com": US
  ".co.uk": UK
  ".de": DE
  ".jp": JP
  ".cn": CN
  ".com.au": AU
  ".com.br": BR
  ".ca": CA
