# Outlet metadata — used by the import script for dedupe and by the site for logos/tier badges.
# Add new outlets as they appear. The script logs unrecognized outlet names; copy them into `aliases`.
#
# Fields:
#   name      canonical display name
#   aliases   raw spellings as they appear in the xlsx (case-insensitive)
#   domain    main website domain (used for region inference + logo URL fallback)
#   tier      1 = global flagship, 2 = strong vertical, 3 = niche / blog / aggregator
#   region    US / UK / EU / DE / JP / CN / AU / CA / BR / NW (worldwide)
#   category  instrument-vertical | music-culture | mass-media | other
#   logo      file under public/coverage/logos/ (optional)
#   default_muv  baseline reach if a row's reach cell is blank (optional)

outlets:
